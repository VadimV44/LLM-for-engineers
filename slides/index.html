 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Использование LLM в инженерной деятельности</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3d3d3d;
            --accent-orange: #ff6b00;
            --accent-orange-light: #ff8533;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --warning-red: #cc0000;
            --success-green: #00cc66;
            --link-blue: #4a9eff;
            --lime-green: #7fff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .presentation {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .slide {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            padding: 60px 80px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        .slide-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 0;
        }

        .slide-content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .slide-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 42px;
            color: var(--text-primary);
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease;
        }

        /* Navigation */
        .navigation {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 1000;
            align-items: center;
        }

        .nav-button {
            width: 80px;
            height: 45px;
            border-radius: 8px;
            background: var(--accent-orange);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: var(--accent-orange-light);
            transform: scale(1.1);
        }

        .nav-button:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Progress indicator */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            z-index: 1000;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-orange);
            transition: width 0.3s ease;
        }

        /* Slide counter – внутри навигации, слева от кнопок */
        .slide-counter {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            color: var(--text-secondary);
            margin-right: 15px;
            display: inline-block;
            vertical-align: middle;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.15);
                opacity: 0.8;
            }
        }

        /* Slide 1: Title */
        .title-slide {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title-slide .slide-title {
            font-size: 54px;
            margin-bottom: 20px;
        }

        .title-slide .slide-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 28px;
            color: var(--accent-orange);
            margin-bottom: 60px;
            line-height: 1.4;
        }

        .author-block {
            position: absolute;
            bottom: 80px;
            left: 80px;
            font-size: 16px;
            color: var(--accent-orange);
            text-align: left;
            line-height: 1.5;
            animation: fadeInUp 0.6s ease 1.2s forwards;
            opacity: 0;
        }

        .author-block .gray-text {
            color: var(--text-secondary);
        }

        .meta-info {
            position: absolute;
            bottom: 80px;
            right: 80px;
            font-size: 16px;
            color: var(--text-secondary);
            text-align: right;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeInUp 0.6s ease 1.4s forwards;
            opacity: 0;
        }

        .headphone-icon {
            width: 40px;
            height: 40px;
            animation: pulse 2s ease-in-out infinite;
        }

        .headphone-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-orange);
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 3.7%;"></div>
    </div>

    <div class="navigation">
        <span class="slide-counter" id="slideCounter">1 / 27</span>
        <!-- Новый порядок: предыдущий, Play, следующий -->
        <button class="nav-button" id="prevBtn" disabled>←</button>
        <button class="nav-button" id="playBtn" onclick="playAudio()">▶</button>
        <button class="nav-button" id="nextBtn" onclick="goToNext()">→</button>
    </div>

    <div class="presentation" id="presentation">
        <!-- Slide 1: Title -->
        <div class="slide active" data-slide="1">
            <div class="slide-background" style="background-image: url('../images/slide_01_background.jpg');"></div>
            <div class="slide-content title-slide">
                <h1 class="slide-title">Использование LLM<br>в инженерной деятельности</h1>
                <p class="slide-subtitle">От теории к практике: как большие языковые модели<br>меняют работу инженера</p>
                <div class="author-block">
                    <span>Идея и реализация: <strong>Вадим Касаткин</strong></span><br>
                    <span class="gray-text">главный специалист УТП СПБ</span>
                </div>
                <div class="meta-info">
                    <div class="headphone-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 1a9 9 0 0 0-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7a9 9 0 0 0-9-9z"/>
                        </svg>
                    </div>
                    <span>Автономная презентация с аудио | ~60 минут</span>
                </div>
            </div>
            <audio id="audio-1" src="../audio/Slide_01_audio.mp3"></audio>
        </div>
    </div>

    <script>
        function playAudio() {
            const audio = document.getElementById('audio-1');
            if (audio) {
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        function goToNext() {
            window.location.href = 'slide_02.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('audio-1');
            if (audio) {
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        });
    </script>
</body>
</html>
